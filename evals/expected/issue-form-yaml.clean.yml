name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to report this issue."
  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reproducible steps.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include versions, OS, browser/runtime, and package manager when relevant.
    validations:
      required: false
