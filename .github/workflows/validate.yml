name: Validate

on:
  pull_request:
    paths:
      - "SKILL.md"
      - "INDEX.md"
      - "README.md"
      - "README.zh-CN.md"
      - "CHANGELOG.md"
      - "references/**"
      - "assets/**"
      - "evals/**"
      - "cases/**"
      - "scripts/**"
      - ".github/**"
  push:
    branches:
      - main
    paths:
      - "SKILL.md"
      - "INDEX.md"
      - "README.md"
      - "README.zh-CN.md"
      - "CHANGELOG.md"
      - "references/**"
      - "assets/**"
      - "evals/**"
      - "cases/**"
      - "scripts/**"
      - ".github/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.x"

      - name: Validate skill and Issue Form YAML
        run: ruby scripts/validate-yaml.rb SKILL.md .github/ISSUE_TEMPLATE/*.yml

      - name: Validate runtime layout and install guide
        run: python3 scripts/validate-runtime-layout.py

      - name: Validate release version consistency
        run: python3 scripts/validate-release-version.py

      - name: Validate eval fixtures
        run: python3 scripts/validate-evals.py

      - name: Validate public case evidence
        run: python3 scripts/validate-cases.py
